<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter - Galaxy Attack</title>
    <!-- Engine Dependency ONLY -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050510; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
            user-select: none;
        }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        
        .glass-panel { 
            background: rgba(15, 15, 30, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.5); padding: 2.5rem; 
            border-radius: 20px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.2); 
            text-align: center; color: white; pointer-events: auto;
            max-width: 85%; width: 380px;
        }
        
        h1 { margin: 0 0 1rem 0; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; text-transform: uppercase; letter-spacing: 3px; font-size: 2.2rem; }
        p { color: #ccc; font-size: 1.1rem; line-height: 1.5; margin-bottom: 2rem; }
        
        .btn { 
            background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 2px solid #00ffcc; 
            padding: 14px 30px; font-size: 1.2rem; cursor: pointer; 
            transition: all 0.3s ease; border-radius: 8px; 
            text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px;
            width: 100%;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4), inset 0 0 10px rgba(0,255,204,0.1);
        }
        .btn:hover { background: #00ffcc; color: #050510; box-shadow: 0 0 30px #00ffcc, inset 0 0 15px #fff; transform: scale(1.05); }
        
        #hud { 
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: #fff; font-size: 1.2rem; font-weight: bold; 
            z-index: 10; display: none; text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .score-box { background: rgba(0,0,0,0.6); padding: 10px 18px; border-radius: 8px; border: 1px solid #00ffcc; color: #00ffcc; }
        .best-box { background: rgba(0,0,0,0.6); padding: 10px 18px; border-radius: 8px; border: 1px solid #ffcc00; color: #ffcc00; }
        
        .boss-warning { position: absolute; top: 80px; width: 100%; text-align: center; color: #ff0055; font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 25px #ff0055; display: none; animation: blink 0.8s infinite; z-index: 10;}
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } }
        
        .mission-overlay {
            position: absolute; top: 40%; width: 100%; text-align: center; color: #00ffcc;
            font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 30px #00ffcc, 0 0 10px #fff;
            display: none; z-index: 20; text-transform: uppercase; pointer-events: none;
        }
        @keyframes flashText { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.2); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); } }

        #start-screen { display: block; }
        #game-over-screen { display: none; border-color: rgba(255, 0, 85, 0.5); box-shadow: 0 0 40px rgba(255, 0, 85, 0.2); }
    </style>
</head>
<body>
    <div id="hud">
        <div class="score-box">SCORE: <span id="score-val">0</span></div>
        <div class="best-box">BEST: <span id="best-val">0</span></div>
    </div>
    
    <div id="boss-warning" class="boss-warning">⚠️ BOSS DETECTED ⚠️</div>
    <div id="mission-overlay" class="mission-overlay">MISSION 1 START</div>

    <div id="ui-layer">
        <div id="start-screen" class="glass-panel">
            <h1>Galaxy Attack</h1>
            <p>Drag / Arrow Keys to Move<br>Auto-fire Activated</p>
            <button class="btn" onclick="startGame()">Start Game</button>
        </div>

        <div id="game-over-screen" class="glass-panel">
            <h1 style="color: #ff0055; text-shadow: 0 0 15px #ff0055;">SYSTEM FAILURE</h1>
            <p>Score: <span id="final-score" style="color: #00ffcc; font-size: 1.8rem; font-weight: bold;">0</span></p>
            <button class="btn" style="border-color: #ff0055; color: #ff0055; background: rgba(255,0,85,0.1);" onclick="restartGame()">Reboot System</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        const AudioSys = {
            ctx: null,
            init: function() {
                try {
                    if(this.ctx) return;
                    window.AudioContext = window.AudioContext || window.webkitAudioContext;
                    if(window.AudioContext) { this.ctx = new AudioContext(); }
                } catch(e) { console.log("Audio API Blocked or unsupported", e); }
            },
            beep: function(freq, type, dur, vol) {
                try {
                    if(!this.ctx || this.ctx.state !== 'running') return;
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                    osc.stop(this.ctx.currentTime + dur);
                } catch(e) {}
            },
            playLaser: function() { this.beep(880, 'square', 0.1, 0.05); },
            playExp: function() { this.beep(150, 'sawtooth', 0.3, 0.1); },
            playPowerup: function() { this.beep(1200, 'sine', 0.4, 0.1); },
            playBoss: function() { this.beep(80, 'square', 1.0, 0.2); },
            playLevelUp: function() { 
                this.beep(400, 'sine', 0.1, 0.1); 
                setTimeout(() => this.beep(600, 'sine', 0.15, 0.1), 150);
                setTimeout(() => this.beep(800, 'sine', 0.3, 0.1), 300);
            }
        };

        let bestScore = localStorage.getItem('galaxy_best_score') || 0;
        document.getElementById('best-val').innerText = bestScore;

        class Laser extends Phaser.Physics.Arcade.Sprite {
            constructor(scene, x, y) { super(scene, x, y, 'laser'); }
            fire(x, y, vx = 0, vy = -800) {
                this.body.reset(x, y);
                this.setActive(true).setVisible(true);
                this.setVelocity(vx, vy);
            }
            preUpdate(time, delta) {
                super.preUpdate(time, delta);
                if (this.y < -50 || this.x < -50 || this.x > 850 || this.y > 950) { 
                    this.setActive(false).setVisible(false); 
                }
            }
        }

        class Enemy extends Phaser.Physics.Arcade.Sprite {
            constructor(scene, x, y) { super(scene, x, y, 'fallback_enemy'); }
            spawn(x, y, speedY, textureKey) {
                this.setTexture(textureKey); 
                this.body.reset(x, y);
                this.setActive(true).setVisible(true);
                this.setVelocityY(speedY);
                this.body.setCircle(22, 3, 3); 
            }
            preUpdate(time, delta) {
                super.preUpdate(time, delta);
                if (this.y > 950) { this.setActive(false).setVisible(false); }
            }
        }

        class PowerUp extends Phaser.Physics.Arcade.Sprite {
            constructor(scene, x, y) { super(scene, x, y, 'powerup'); }
            spawn(x, y, type) {
                this.powerType = type; 
                this.setTint(type === 0 ? 0x00ffcc : type === 1 ? 0x0088ff : type === 2 ? 0xffcc00 : 0xff0055);
                this.body.reset(x, y);
                this.setActive(true).setVisible(true);
                this.setVelocityY(150);
                this.body.setCircle(15);
            }
            preUpdate(time, delta) {
                super.preUpdate(time, delta);
                this.rotation += 0.05;
                if (this.y > 950) { this.setActive(false).setVisible(false); }
            }
        }

        let gameSceneInstance = null;

        class SpaceScene extends Phaser.Scene {
            constructor() { 
                super({ key: 'SpaceScene' }); 
                gameSceneInstance = this;
            }

            preload() {
                // Request images, but don't panic if they fail
                this.load.image('hero_img', 'hero.webp');
                this.load.image('boss_img', 'spaceship.1.jpg');
                this.load.image('enemy_sheet', 'web game .webp');
                
                this.load.on('loaderror', (file) => { console.log('Asset missing or blocked, will use auto-fallback for:', file.key); });

                let g = this.make.graphics({x: 0, y: 0}, false);
                
                g.fillStyle(0x00ffcc, 1); g.fillRect(0, 0, 6, 30);
                g.generateTexture('laser', 6, 30); g.clear();

                g.fillStyle(0xffffff, 1); g.fillCircle(15, 15, 15);
                g.generateTexture('powerup', 30, 30); g.clear();

                g.fillStyle(0xff0055, 1); g.fillCircle(4, 4, 4); g.generateTexture('part_red', 8, 8); g.clear();
                g.fillStyle(0x00ffcc, 1); g.fillCircle(4, 4, 4); g.generateTexture('part_cyan', 8, 8); g.clear();
                g.fillStyle(0xffcc00, 1); g.fillCircle(4, 4, 4); g.generateTexture('part_yellow', 8, 8); g.clear();

                g.fillStyle(0xff0055, 1); g.fillRect(0,0,50,50); g.generateTexture('fallback_enemy', 50, 50); g.clear();
                g.fillStyle(0x00ffcc, 1); g.fillTriangle(25,0, 0,50, 50,50); g.generateTexture('fallback_hero', 50, 50); g.destroy();
            }

            create() {
                const GW = this.scale.width;
                const GH = this.scale.height;
                
                // --- SAFE TEXTURE SCANNER (Prevents Invisible Bug) ---
                const getSafeTex = (key, fallback) => {
                    let tex = this.textures.exists(key) ? this.textures.get(key) : null;
                    if (tex && tex.key !== '__DEFAULT' && tex.source[0] && tex.source[0].width > 10) {
                        return key;
                    }
                    console.log(`Using fallback for ${key} to prevent invisible sprite.`);
                    return fallback;
                };

                let heroTex = getSafeTex('hero_img', 'fallback_hero');
                let bossTex = getSafeTex('boss_img', 'fallback_enemy');

                this.enemyTextures = [];
                let sheetKey = getSafeTex('enemy_sheet', null);
                if (sheetKey) {
                    try {
                        let img = this.textures.get(sheetKey).getSourceImage();
                        if (img && img.naturalWidth > 50) {
                            for(let i=0; i<8; i++) {
                                let canvas = Phaser.Display.Canvas.CanvasPool.create2D(this, 50, 50);
                                let ctx = canvas.getContext('2d');
                                let rx = Phaser.Math.Between(0, Math.max(0, img.width - 50));
                                let ry = Phaser.Math.Between(0, Math.max(0, img.height - 50));
                                ctx.drawImage(img, rx, ry, 50, 50, 0, 0, 50, 50);
                                this.textures.addCanvas('logo_' + i, canvas);
                                this.enemyTextures.push('logo_' + i);
                            }
                        }
                    } catch(err) { console.warn("Canvas blocked, using fallback", err); }
                }
                
                if(this.enemyTextures.length === 0) {
                    this.enemyTextures = ['fallback_enemy'];
                }

                this.score = 0; this.isGameOver = true; this.level = 1; this.bossActive = false;
                
                this.stars = [];
                for(let i=0; i<100; i++) {
                    let s = this.add.image(Phaser.Math.Between(0, GW), Phaser.Math.Between(0, GH), 'part_cyan')
                            .setAlpha(Math.random()*0.5).setScale(Math.random() * 0.8);
                    this.stars.push(s);
                }

                this.player = this.physics.add.sprite(GW/2, GH - 100, heroTex);
                if(this.player.width > 100) { this.player.setDisplaySize(70, 70); }
                this.player.setCollideWorldBounds(true);
                
                let rad = (this.player.displayWidth * 0.4) || 20;
                let offsetX = (this.player.width - rad*2)/2 || 0;
                let offsetY = (this.player.height - rad*2)/2 || 0;
                this.player.body.setCircle(rad, offsetX, offsetY); 
                this.player.setVisible(false);

                this.sidekickL = this.add.sprite(0, 0, heroTex).setDisplaySize(35, 35).setVisible(false);
                this.sidekickR = this.add.sprite(0, 0, heroTex).setDisplaySize(35, 35).setVisible(false);

                this.boss = this.physics.add.sprite(GW/2, -150, bossTex).setVisible(false);
                this.bossHP = 0; this.bossMaxHP = 0;
                this.bossHpBg = this.add.graphics().setVisible(false).setDepth(20);
                this.bossHpBar = this.add.graphics().setVisible(false).setDepth(20);

                this.lasers = this.physics.add.group({ classType: Laser, maxSize: 60, runChildUpdate: true });
                this.bossLasers = this.physics.add.group({ classType: Laser, maxSize: 40, runChildUpdate: true });
                this.enemies = this.physics.add.group({ classType: Enemy, maxSize: 35, runChildUpdate: true });
                this.powerups = this.physics.add.group({ classType: PowerUp, maxSize: 5, runChildUpdate: true });

                this.emitRed = this.add.particles(0, 0, 'part_red', { emitting: false, speed: 180, lifespan: 400, scale: { start: 1.5, end: 0 }, blendMode: 'ADD' });
                this.emitCyan = this.add.particles(0, 0, 'part_cyan', { emitting: false, speed: 180, lifespan: 400, scale: { start: 1.5, end: 0 }, blendMode: 'ADD' });
                this.emitYellow = this.add.particles(0, 0, 'part_yellow', { emitting: false, speed: 180, lifespan: 400, scale: { start: 1.5, end: 0 }, blendMode: 'ADD' });

                this.physics.add.overlap(this.lasers, this.enemies, this.hitEnemy, null, this);
                this.physics.add.overlap(this.lasers, this.boss, this.hitBoss, null, this);
                this.physics.add.overlap(this.lasers, this.bossLasers, this.laserClash, null, this);
                this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);
                this.physics.add.overlap(this.player, this.bossLasers, this.hitPlayer, null, this);
                this.physics.add.overlap(this.player, this.boss, this.hitPlayer, null, this);
                this.physics.add.overlap(this.player, this.powerups, this.collectPowerup, null, this);

                this.cursors = this.input.keyboard.createCursorKeys();
                this.input.on('pointermove', pointer => {
                    if (!this.isGameOver) { this.player.x = Phaser.Math.Clamp(pointer.x, 40, GW - 40); }
                });

                this.resetStats();
            }

            resetStats() {
                this.spreadFire = false; this.hasSidekicks = false; this.fireDelay = 220;
                this.lastFired = 0; this.enemySpawnTimer = 0; this.bossFireTimer = 0;
            }

            update(time, delta) {
                this.stars.forEach(star => {
                    star.y += star.scale * 3;
                    if(star.y > this.scale.height) { star.y = -10; star.x = Phaser.Math.Between(0, this.scale.width); }
                });

                if (this.isGameOver) return;

                if (this.cursors.left.isDown) this.player.setVelocityX(-550);
                else if (this.cursors.right.isDown) this.player.setVelocityX(550);
                else this.player.setVelocityX(0);

                if(this.hasSidekicks) {
                    this.sidekickL.setPosition(this.player.x - 60, this.player.y + 20);
                    this.sidekickR.setPosition(this.player.x + 60, this.player.y + 20);
                }

                if (time > this.lastFired) {
                    this.fireWeapon();
                    this.lastFired = time + this.fireDelay;
                }

                if (this.score > 0 && this.score % 100 === 0 && !this.bossActive) {
                    this.spawnBoss();
                }

                if (this.bossActive) {
                    this.bossHpBg.clear(); this.bossHpBg.fillStyle(0x000000, 0.7);
                    this.bossHpBg.fillRect(this.boss.x - 75, this.boss.y - 110, 150, 12);
                    
                    this.bossHpBar.clear(); this.bossHpBar.fillStyle(0xff0055, 1);
                    let hpPct = Math.max(0, this.bossHP / this.bossMaxHP);
                    this.bossHpBar.fillRect(this.boss.x - 75, this.boss.y - 110, 150 * hpPct, 12);

                    // FIX: Checking for NaN to prevent invisible freeze
                    if (this.boss.y < 150 && !isNaN(this.boss.y)) {
                        this.boss.setVelocityY(100);
                    } else if (!isNaN(this.boss.y)) {
                        this.boss.setVelocityY(0);
                        let speedMultiplier = 0.8 + (this.level * 0.2);
                        this.boss.x = this.scale.width/2 + Math.sin(time/(800 / speedMultiplier)) * 200; 
                        
                        if (time > this.bossFireTimer) {
                            this.bossFire();
                            this.bossFireTimer = time + Math.max(500, 1800 - (this.level * 300)); 
                        }
                    }
                } else {
                    if (time > this.enemySpawnTimer) {
                        let e = this.enemies.get();
                        if (e) {
                            let randomLogo = Phaser.Math.RND.pick(this.enemyTextures);
                            e.spawn(Phaser.Math.Between(50, this.scale.width-50), -50, Phaser.Math.Between(200, 400 + (this.level*50)), randomLogo);
                            this.enemySpawnTimer = time + Phaser.Math.Between(500, 1000 - (this.level*30));
                        }
                    }
                }
            }

            fireWeapon() {
                AudioSys.playLaser();
                
                let setupLaser = (laser) => {
                    if(!laser) return;
                    if(this.bossActive) {
                        laser.setScale(2.5); 
                        laser.setTint(0xffffff);
                        laser.body.setSize(40, 50, true); 
                    } else {
                        laser.setScale(1); 
                        laser.clearTint();
                        laser.body.setSize(10, 30, true);
                    }
                };

                let l = this.lasers.get(); 
                if(l) { l.fire(this.player.x, this.player.y - 40); setupLaser(l); }

                if(this.spreadFire) {
                    let l1 = this.lasers.get(); if(l1) { l1.fire(this.player.x, this.player.y - 30, -200, -750); setupLaser(l1); }
                    let l2 = this.lasers.get(); if(l2) { l2.fire(this.player.x, this.player.y - 30, 200, -750); setupLaser(l2); }
                    let l3 = this.lasers.get(); if(l3) { l3.fire(this.player.x, this.player.y - 20, -400, -700); setupLaser(l3); }
                    let l4 = this.lasers.get(); if(l4) { l4.fire(this.player.x, this.player.y - 20, 400, -700); setupLaser(l4); }
                }
                if(this.hasSidekicks) {
                    let sl = this.lasers.get(); if(sl) { sl.fire(this.sidekickL.x, this.sidekickL.y - 20); setupLaser(sl); }
                    let sr = this.lasers.get(); if(sr) { sr.fire(this.sidekickR.x, this.sidekickR.y - 20); setupLaser(sr); }
                }
            }

            bossFire() {
                AudioSys.playBoss();
                let spreadCount = Math.min(7, 1 + (this.level * 2)); 
                let spread = [];
                for(let i=0; i<spreadCount; i++) {
                    spread.push(-200 + (400 / Math.max(1, spreadCount-1)) * i);
                }
                let laserSpeed = 220 + (this.level * 70);

                spread.forEach(vx => {
                    let bl = this.bossLasers.get();
                    if(bl) { 
                        bl.fire(this.boss.x, this.boss.y + 60, vx, laserSpeed); 
                        bl.setTexture('part_red'); 
                        bl.setScale(3);
                        bl.body.setSize(8, 8, true); 
                    }
                });
            }

            hitEnemy(laser, enemy) {
                if (!laser.active || !enemy.active) return;
                laser.setActive(false).setVisible(false);
                enemy.setActive(false).setVisible(false);
                
                AudioSys.playExp();
                this.emitRed.emitParticleAt(enemy.x, enemy.y, 8); 
                
                this.addScore(10);
                this.spawnPowerupChance(enemy.x, enemy.y, false);
            }

            hitBoss(laser, boss) {
                if (!laser.active || !boss.active) return;
                laser.setActive(false).setVisible(false);
                
                this.bossHP--;
                this.boss.setTint(0xff0000); 
                this.time.delayedCall(80, () => { if(boss && boss.active) boss.clearTint(); });
                this.emitYellow.emitParticleAt(laser.x, laser.y - 10, 15);
                
                if(this.bossHP <= 0) {
                    this.bossHpBg.setVisible(false);
                    this.bossHpBar.setVisible(false);
                    
                    AudioSys.playExp();
                    this.cameras.main.shake(1200, 0.04); 
                    
                    for(let i = 0; i < 6; i++) {
                        this.time.delayedCall(i * 150, () => {
                            this.emitYellow.emitParticleAt(boss.x + Phaser.Math.Between(-70, 70), boss.y + Phaser.Math.Between(-70, 70), 40);
                        });
                    }
                    
                    boss.setActive(false).setVisible(false);
                    this.bossActive = false;
                    this.level++;
                    this.addScore(10); 
                    this.spawnPowerupChance(boss.x, boss.y, true); 
                    document.getElementById('boss-warning').style.display = 'none';
                    
                    this.showMissionText(`BOSS DESTROYED!\nMISSION ${this.level} START!`);
                    this.time.delayedCall(1200, () => AudioSys.playLevelUp());
                }
            }

            laserClash(pLaser, bLaser) {
                if(pLaser.active && bLaser.active) {
                    pLaser.setActive(false).setVisible(false);
                    bLaser.setActive(false).setVisible(false);
                    this.emitYellow.emitParticleAt(pLaser.x, pLaser.y, 10);
                }
            }

            hitPlayer(player, hazard) {
                if (!hazard.active) return;
                
                this.isGameOver = true;
                this.bossHpBg.setVisible(false);
                this.bossHpBar.setVisible(false);
                this.physics.pause();
                AudioSys.playExp();
                this.cameras.main.shake(600, 0.03); 
                this.emitCyan.emitParticleAt(player.x, player.y, 50);
                player.setVisible(false);
                this.sidekickL.setVisible(false); this.sidekickR.setVisible(false);
                
                if(this.score > bestScore) {
                    bestScore = this.score;
                    localStorage.setItem('galaxy_best_score', bestScore);
                    document.getElementById('best-val').innerText = bestScore;
                }
                
                setTimeout(() => {
                    document.getElementById('hud').style.display = 'none';
                    document.getElementById('game-over-screen').style.display = 'block';
                    document.getElementById('final-score').innerText = this.score;
                }, 1000);
            }

            spawnPowerupChance(x, y, force = false) {
                if(force || Math.random() < 0.08) { 
                    let p = this.powerups.get();
                    if(p) p.spawn(x, y, Phaser.Math.Between(0, 3));
                }
            }

            collectPowerup(player, powerup) {
                if(!powerup.active) return;
                powerup.setActive(false).setVisible(false);
                AudioSys.playPowerup();
                this.emitYellow.emitParticleAt(powerup.x, powerup.y, 10);

                if(powerup.powerType === 0) this.spreadFire = true;
                if(powerup.powerType === 1) { this.hasSidekicks = true; this.sidekickL.setVisible(true); this.sidekickR.setVisible(true); }
                if(powerup.powerType === 2) this.fireDelay = 90; 
                if(powerup.powerType === 3) { 
                    this.enemies.children.iterate(e => {
                        if(e && e.active) {
                            e.setActive(false).setVisible(false);
                            this.emitRed.emitParticleAt(e.x, e.y, 5);
                            this.addScore(10);
                        }
                    });
                }

                this.time.delayedCall(8000, () => {
                    this.spreadFire = false;
                    this.hasSidekicks = false; this.sidekickL.setVisible(false); this.sidekickR.setVisible(false);
                    this.fireDelay = 220;
                });
            }

            addScore(pts) {
                this.score += pts;
                document.getElementById('score-val').innerText = this.score;
            }

            spawnBoss() {
                if(this.bossActive) return;
                this.bossActive = true;
                
                document.getElementById('boss-warning').style.display = 'block';
                AudioSys.playBoss();
                this.showMissionText(`WARNING: LEVEL ${this.level} BOSS`);
                this.cameras.main.shake(800, 0.01);
                
                this.enemies.children.iterate(e => { if(e) e.setActive(false).setVisible(false); });

                this.bossHP = 20 + (this.level * 15); 
                this.bossMaxHP = this.bossHP;
                
                this.bossHpBg.setVisible(true);
                this.bossHpBar.setVisible(true);

                // BULLETPROOF SPAWN FIX: Prevent NaN physics crash
                this.boss.setActive(true).setVisible(true);
                this.boss.setPosition(this.scale.width/2, -100);
                
                // FIX: setAngle(180) breaks hitboxes. Use setFlipY instead!
                this.boss.setAngle(0); 
                this.boss.setFlipY(true);
                
                this.boss.setDisplaySize(160, 160);
                
                // Safely calculate hitbox to prevent invisible/invincible bug
                let safeW = (this.boss.width && this.boss.width > 10) ? this.boss.width : 160;
                let safeH = (this.boss.height && this.boss.height > 10) ? this.boss.height : 160;
                
                this.boss.body.setSize(safeW * 0.8, safeH * 0.8, true); 
                this.boss.setVelocityY(100); // Start moving down immediately
            }
            
            showMissionText(text) {
                let missionText = document.getElementById('mission-overlay');
                if(!missionText) return;
                missionText.innerText = text;
                missionText.style.display = 'block';
                missionText.style.animation = 'none';
                void missionText.offsetWidth; 
                missionText.style.animation = 'flashText 3s forwards';
                setTimeout(() => { missionText.style.display = 'none'; }, 3000);
            }

            startNewGame() {
                this.score = 0; document.getElementById('score-val').innerText = '0';
                this.level = 1; this.bossActive = false; this.isGameOver = false;
                
                this.resetStats();
                this.sidekickL.setVisible(false); this.sidekickR.setVisible(false);
                document.getElementById('boss-warning').style.display = 'none';
                
                this.showMissionText('MISSION 1 START');
                AudioSys.playLevelUp();
                
                this.physics.resume();
                this.player.setPosition(this.scale.width/2, this.scale.height - 100).setVisible(true);
                
                [this.lasers, this.bossLasers, this.enemies, this.powerups].forEach(group => {
                    group.children.iterate(c => { if(c) c.setActive(false).setVisible(false); });
                });
                
                // FIX: Reset boss completely on new game
                this.boss.setActive(false).setVisible(false);
                this.boss.setPosition(this.scale.width/2, -150);
                this.boss.setVelocity(0, 0);
                
                this.bossHpBg.setVisible(false);
                this.bossHpBar.setVisible(false);
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 650,
            height: 950,
            parent: 'game-container',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { debug: false } },
            transparent: true,
            scene: SpaceScene
        };

        const game = new Phaser.Game(config);

        function startGame() {
            try { AudioSys.init(); } catch(e) {}
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            
            if (gameSceneInstance) {
                gameSceneInstance.startNewGame();
            } else {
                setTimeout(() => startGame(), 100);
            }
        }

        function restartGame() {
            try { AudioSys.init(); } catch(e) {}
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            if (gameSceneInstance) {
                gameSceneInstance.startNewGame();
            }
        }
    </script>
</body>
</html>
